<!DOCTYPE html>
<html>
<head>
    <title>SweetCaneHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: url("{{ url_for('static', filename='Images/S1.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            margin-left: 25px;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #4CAF50;
        }

        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero-content span {
            color: #4CAF50;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #3e8e41;
        }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: rgba(0,0,0,0.7);
            color: white;
            font-size: 14px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">SweetCaneHub 🌿</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/diseases">Diseases</a>
            <a href="/contact">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <div class="hero-content">
            <h1>AI Powered <span>Sugarcane</span> Leaf Detection</h1>
            <p>
                Upload your sugarcane leaf image and instantly detect whether it is Healthy or Diseased using our Deep Learning Model.
            </p>

            <button class="btn" onclick="location.href='/login'">Login</button>
            <button class="btn" onclick="location.href='/register'">Register</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 SweetCaneHub | Developed for Sugarcane Leaf Disease Identification
    </div>

</div>

</body>
</html>
